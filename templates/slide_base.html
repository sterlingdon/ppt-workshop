<!DOCTYPE html>
<html lang="{{ lang | default('zh') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="stylesheet" href="{{ theme_css_path }}">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-body);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

.presentation {
  width: var(--slide-width, 1280px);
  height: var(--slide-height, 720px);
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-slow, 600ms ease);
  padding: var(--slide-padding, 3rem 4rem);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.slide.active {
  opacity: 1;
  pointer-events: all;
}

/* 背景 Blob 系统 */
.blob-container {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  opacity: var(--enable-blobs, 1);
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(var(--blob-blur, 80px));
  opacity: var(--blob-opacity, 0.12);
  mix-blend-mode: screen;
}

/* 标题渐变文字 */
.heading-gradient {
  background: var(--gradient-heading);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Glass 卡片 */
.glass-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  padding: var(--card-padding);
  backdrop-filter: var(--card-backdrop, blur(12px));
  box-shadow: var(--card-shadow);
}

/* 进度条 */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: var(--gradient-accent-line);
  transition: width 0.3s ease;
  z-index: 100;
}

/* 幻灯片编号 */
#slide-counter {
  position: fixed;
  bottom: 1.5rem;
  right: 2rem;
  font-size: var(--font-size-small);
  color: var(--color-text-subtle);
  font-family: var(--font-mono);
}

/* 统计数字动画 */
.stat-value {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: var(--font-weight-display);
  line-height: 1;
}

.stat-value.gradient-text {
  background: var(--gradient-heading);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 分隔线 */
.accent-divider {
  height: var(--divider-height, 2px);
  background: var(--divider-gradient, var(--gradient-accent-line));
  border: none;
  border-radius: 2px;
  margin: 1rem 0;
}
</style>
</head>
<body>

<div id="progress-bar" style="width: 0%"></div>
<div id="slide-counter">1 / {{ slides | length }}</div>

<div class="presentation">
{% for slide in slides %}
  <div class="slide {{ 'active' if loop.first else '' }}" data-index="{{ loop.index0 }}" data-type="{{ slide.type }}">
    <!-- Blob 背景 -->
    {% if slide.blobs %}
    <div class="blob-container">
      {% for blob in slide.blobs %}
      <div class="blob" style="width:{{ blob.size }}px; height:{{ blob.size }}px; left:{{ blob.x }}%; top:{{ blob.y }}%; background:{{ blob.color }};"></div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- 幻灯片内容 -->
    {{ slide.html_content | safe }}
  </div>
{% endfor %}
</div>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const progressBar = document.getElementById('progress-bar');
  const counter = document.getElementById('slide-counter');
  let current = 0;

  function goTo(n) {
    if (n < 0 || n >= slides.length) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    const pct = ((current + 1) / slides.length) * 100;
    progressBar.style.width = pct + '%';
    counter.textContent = (current + 1) + ' / ' + slides.length;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') goTo(current + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  });

  goTo(0);
})();
</script>
</body>
</html>
